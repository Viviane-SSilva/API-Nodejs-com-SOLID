
version: '3.8'

services:
  postgres:
    image: bitnami/postgresql
    container_name: test-api-solid-rock-pg
    restart: always
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: apisolid
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: